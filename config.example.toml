# Flare — Edge Mesh Configuration
# Path: /etc/flare.toml or $HOME/.config/flare.toml

[node]
name = "node-alpha"                # Unique node name in the mesh
listen = ":9721"                   # WebSocket listen address for peer connections
data_dir = "/var/lib/flare"        # Directory for synced files and state
log_level = "info"                 # debug | info | warn | error

[mesh]
peers = [                          # Static peer addresses (optional, for bootstrap)
  # "ws://node-beta.local:9721",
  # "wss://10.0.0.42:9721",
]
discovery = "mdns"                 # "mdns" | "static" | "both"
reconnect_interval = "10s"         # Deprecated: use backoff_min instead
backoff_min = "1s"                 # Initial backoff delay between reconnects
backoff_max = "60s"                # Maximum backoff delay (exponential growth)
circuit_breaker_limit = 10         # Consecutive failures before opening circuit (0=disabled)

[sync]
watch_dirs = [                     # Directories to sync across the mesh
  { path = "./shared", tag = "default" },
]
poll_interval = "5s"               # File system poll interval
chunk_size = 65536                 # Transfer chunk size in bytes
# bandwidth_limit = 1048576        # Max bytes/sec for outgoing transfers (0=unlimited, default)
# bandwidth_burst = 2097152        # Burst size in bytes (default = bandwidth_limit)

[cron]
enabled = true                     # Enable distributed cron scheduler
history_size = 100                 # Max completed job history entries

[[cron.jobs]]
name = "disk-check"
schedule = "0 * * * *"            # Every hour
command = "df -h /"
timeout = "30s"

[[cron.jobs]]
name = "heartbeat"
schedule = "* * * * *"            # Every minute
command = "echo 'alive' >> /tmp/flare-heartbeat"
timeout = "10s"
