[node]
name = "vpn-instance"
listen = ":9721"
data_dir = "/home/patrick/.flare"
log_level = "info"

[mesh]
peers = []
discovery = "static"
reconnect_interval = "10s"

[sync]
watch_dirs = [
  { path = "/home/patrick/.flare/shared", tag = "default" },
]
poll_interval = "5s"
chunk_size = 65536

[cron]
enabled = true
history_size = 100
