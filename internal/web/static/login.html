<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flare — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
  }
  .login-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 40px;
    width: 360px;
    max-width: 90vw;
  }
  .logo {
    text-align: center;
    margin-bottom: 8px;
  }
  .logo h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, #58a6ff, #3fb950);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo p {
    color: #8b949e;
    font-size: 14px;
    margin-top: 4px;
  }
  .form-group {
    margin-top: 20px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #8b949e;
    margin-bottom: 6px;
  }
  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 10px 12px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #c9d1d9;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus, input[type="password"]:focus {
    border-color: #58a6ff;
  }
  button {
    width: 100%;
    padding: 10px;
    margin-top: 24px;
    background: #238636;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #2ea043; }
  button:disabled {
    background: #1a5a28;
    cursor: not-allowed;
    opacity: 0.7;
  }
  .error {
    color: #f85149;
    font-size: 13px;
    text-align: center;
    margin-top: 16px;
    display: none;
  }
  .error.visible { display: block; }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <h1>△ Flare</h1>
    <p>Edge Mesh Dashboard</p>
  </div>
  <form id="loginForm" autocomplete="on">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required autofocus>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" id="loginBtn">Sign in</button>
    <div class="error" id="errorMsg"></div>
  </form>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const errorEl = document.getElementById('errorMsg');
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  errorEl.classList.remove('visible');

  try {
    const form = new FormData();
    form.set('username', document.getElementById('username').value);
    form.set('password', document.getElementById('password').value);

    const res = await fetch('/api/login', { method: 'POST', body: form });
    const data = await res.json();

    if (res.ok) {
      window.location.href = '/';
    } else {
      errorEl.textContent = data.error || 'Invalid credentials';
      errorEl.classList.add('visible');
    }
  } catch (err) {
    errorEl.textContent = 'Connection error — is Flare running?';
    errorEl.classList.add('visible');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
});
</script>
</body>
</html>
